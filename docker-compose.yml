services:
  springboot:
    build: ./services/decision-engine
    ports:
      - "8080:8080"
    depends_on:
      - fastapi
    environment:
      - AI_SERVICE_URL=http://fastapi:8000
    networks:
      - app-network
    restart: always
    
  fastapi:
    build: ./services/ai-service
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - app-network
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - springboot
    networks:
      - app-network
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - fastapi
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
